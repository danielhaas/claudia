# Claudia tmux config - optimized for Claude Code sessions
# This is sourced IN ADDITION to your regular tmux.conf

# Mouse support (critical for mobile touch scrolling)
set -g mouse on

# Large scroll buffer
set -g history-limit 50000

# Better terminal colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Don't auto-rename windows
set -g allow-rename off

# Status bar - show session name clearly
set -g status-left '[#S] '
set -g status-left-length 30

# Reduce escape delay (makes claude CLI feel snappier)
set -sg escape-time 10

# Mark session so shell knows to detach on exit
set-environment CLAUDIA_SESSION 1
